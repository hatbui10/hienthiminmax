<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Copy</title>
    <style>
        /* Tối ưu tràn viền, bỏ bớt khoảng trắng dư thừa */
        html, body { margin: 0; padding: 0; width: 100%; background-color: #f0f2f5; display: flex; justify-content: center; }
        
        .card { 
            background: white; 
            width: 98%; /* Tràn gần hết màn hình điện thoại */
            max-width: 450px; 
            margin-top: 10px; 
            padding: 20px 10px; 
            border-radius: 12px; 
            box-sizing: border-box; 
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { margin: 0 0 15px 0; font-size: 1.3rem; color: #333; }

        /* Ô nhập liệu to, rõ */
        #numInput {
            width: 30%; 
            height: 70px; 
            font-size: 3rem; 
            font-weight: bold; 
            text-align: center; 
            border: 4px solid #007bff; 
            border-radius: 15px; 
            outline: none; 
            display: block; 
            margin: 0 auto 20px auto;
            color: #007bff;
        }

        /* Kết quả 3 dòng */
        .result-container { 
            text-align: left; 
            background: #f8f9fa; 
            border-radius: 10px; 
            padding: 15px; 
            margin-bottom: 20px;
            border: 1px solid #eee;
        }
        .result-line { 
            display: flex; 
            padding: 8px 0; 
            border-bottom: 1px dashed #ccc; 
            font-size: 1.1rem; 
        }
        .result-line:last-child { border-bottom: none; }
        .label { font-weight: bold; color: #555; width: 95px; flex-shrink: 0; }
        .value { color: #333; }

        /* Ô Copy hiện số kèm chữ x */
        .copy-box { 
            font-size: 1rem; 
            color: #666; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
        }
        #lastNum { 
            font-size: 2rem; 
            font-weight: bold; 
            color: #28a745; 
            background: #e8f5e9; 
            padding: 5px 20px; 
            border-radius: 8px; 
            border: 1px solid #c8e6c9;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Nhập 2 Số</h2>
    
    <input type="text" id="numInput" 
           maxlength="2" 
           inputmode="numeric" 
           pattern="[0-9]*" 
          
           autofocus 
           autocomplete="off">
    
    <div class="result-container">
        <div class="result-line"><span class="label">Sản phẩm:</span> <span class="value" id="line1">---</span></div>
        <div class="result-line"><span class="label">Đơn giá:</span> <span class="value" id="line2">---</span></div>
        <div class="result-line"><span class="label">Ghi chú:</span> <span class="value" id="line3">---</span></div>
    </div>

    <div class="copy-box">
        <span>Đã copy:</span>
        <span id="lastNum">--</span>
    </div>
</div>

<script>
    // Dữ liệu tra cứu (Chỉ dùng 2 số làm Key)
    const DATA_MAP = {
        "00": { n: "Mặt hàng 00", p: "Miễn phí", g: "Kho tổng" },
        "01": { n: "Mặt hàng 01", p: "50.000đ", g: "Kệ A1" },
        "67": { n: "Mặt hàng 67", p: "120.000đ", g: "Kệ B3" }
    };

    const inputEl = document.getElementById('numInput');
    const l1 = document.getElementById('line1');
    const l2 = document.getElementById('line2');
    const l3 = document.getElementById('line3');
    const lastNum = document.getElementById('lastNum');

    inputEl.addEventListener('input', function() {
        // Chỉ cho phép nhập số vào ô nhập chính
        this.value = this.value.replace(/\D/g, '');

        if (this.value.length === 2) {
            const val = this.value;
            const data = DATA_MAP[val];

            // 1. Hiển thị kết quả 3 dòng
            if (data) {
                l1.innerText = data.n;
                l2.innerText = data.p;
                l3.innerText = data.g;
            } else {
                l1.innerText = "Không tìm thấy";
                l2.innerText = "---";
                l3.innerText = "---";
            }

            // 2. TẠO CHUỖI CÓ CHỮ X (Ví dụ: "00x")
            const stringToCopy = val + "x";

            // 3. Hiển thị chuỗi kèm x lên ô copy màu xanh
            lastNum.innerText = stringToCopy;

            // 4. TỰ ĐỘNG COPY CHUỖI KÈM X VÀO BỘ NHỚ
            copyToClipboard(stringToCopy);

            // 5. Xóa ô nhập sau 150ms để gõ tiếp số mới
            setTimeout(() => {
                this.value = '';
                this.focus();
            }, 150);
        }
    });

    function copyToClipboard(text) {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text);
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
        }
    }

    // Luôn giữ focus để nhập liên tục không cần chạm màn hình
    document.addEventListener('click', () => inputEl.focus());
</script>

</body>
</html>
