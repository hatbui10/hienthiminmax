<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm khối số</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; min-height: 100vh;
            display: flex; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            align-items: flex-start; 
            background: #0d0f13;
            color: #fff;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 10px auto;
            text-align: center;
        }

        /* Vùng tải file */
        .file-upload {
            background: #1c1f26;
            padding: 12px;
            border-radius: 10px;
            border: 1px dashed #444;
            margin-bottom: 15px;
        }
        input[type="file"] { font-size: 0.75rem; color: #888; }

        /* Ô nhập số */
        #numInput {
            width: 85%;
            height: 90px;
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            border: 3px solid #00d2ff;
            border-radius: 20px;
            background: #000;
            color: #00d2ff;
            outline: none;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.2);
        }

        /* Khu vực kết quả */
        #resultArea {
            text-align: center;
            background: #1c1f26;
            border-radius: 12px;
            padding: 5px 15px;
            display: none;
            border: 1px solid #333;
            max-height: 400px;
            overflow-y: auto;
        }

        .result-item {
            padding: 12px 0;
            border-bottom: 1px solid #2d323a;
            font-family: 'Consolas', monospace;
            font-size: 1.15rem;
        }
        .result-item:last-child { border-bottom: none; }

        .highlight { color: #ff4757; font-weight: bold; margin-right: 5px; }

        .status-bar { 
            background: #252a33;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 10px;
            color: #00ff88;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="file-upload">
        <div style="margin-bottom: 8px; font-size: 0.8rem; color: #aaa;">Tải tệp mới để cập nhật dữ liệu:</div>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <input type="text" id="numInput" maxlength="2" placeholder="--" inputmode="numeric" autofocus autocomplete="off">
    
    <div id="resultArea"></div>

    <div class="status-bar" id="statusMsg">Đang kiểm tra dữ liệu cũ...</div>
</div>

<script>
    let allLines = [];
    const STORAGE_KEY = 'my_txt_data'; // Khóa để lưu vào trình duyệt

    const fileInput = document.getElementById('fileInput');
    const numInput = document.getElementById('numInput');
    const resultArea = document.getElementById('resultArea');
    const statusMsg = document.getElementById('statusMsg');

    // 1. Hàm khởi tạo: Kiểm tra xem LocalStorage có dữ liệu cũ không
    window.onload = function() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
            allLines = JSON.parse(savedData);
            statusMsg.innerText = "Sẵn sàng! (Đã nạp " + allLines.length + " dòng từ bộ nhớ)";
        } else {
            statusMsg.innerText = "Chưa có dữ liệu. Vui lòng tải tệp .txt";
            statusMsg.style.color = "#ff4757";
        }
        numInput.focus();
    };

    // 2. Xử lý khi người dùng chọn Tệp mới (Cập nhật dữ liệu)
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            // Xử lý nội dung file thành mảng các dòng
            allLines = content.split(/\r?\n/).filter(line => line.trim() !== "");
            
            // Lưu mảng này vào LocalStorage dưới dạng chuỗi JSON
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allLines));
            
            alert("Đã cập nhật dữ liệu mới!");
            statusMsg.innerText = "Đã cập nhật " + allLines.length + " dòng mới.";
            statusMsg.style.color = "#00ff88";
            numInput.focus();
        };
        reader.readAsText(file);
    });

    // 3. Xử lý khi nhập 2 số
    numInput.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
        const searchVal = this.value;

        if (searchVal.length === 2) {
            if (allLines.length === 0) {
                alert("Dữ liệu trống! Hãy tải tệp .txt");
                this.value = "";
                return;
            }

            // Quét tìm dòng khớp
            const matches = allLines.filter(line => line.trim().startsWith(searchVal));

            if (matches.length > 0) {
                resultArea.innerHTML = "";
                resultArea.style.display = "block";

                matches.forEach(line => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    
                    // Tách 2 số đầu để tô màu
                    const prefix = line.substring(0, 2);
                    const rest = line.substring(2);
                    div.innerHTML = `<span class="highlight">${prefix}</span>${rest}`;
                    
                    resultArea.appendChild(div);
                });

                // Tự động Copy số đó + "x"
                const copyText = searchVal + "x";
                navigator.clipboard.writeText(copyText).then(() => {
                    statusMsg.innerHTML = `Đã tìm thấy ${matches.length} dòng. <b>Copy: ${copyText}</b>`;
                });

            } else {
                resultArea.style.display = "none";
                statusMsg.innerText = "Không tìm thấy khối: " + searchVal;
            }

            // Xóa ô nhập sau 800ms để nhập lượt mới
            setTimeout(() => {
                this.value = "";
                this.focus();
            }, 800);
        }
    });

    // Luôn focus
    document.addEventListener('click', (e) => {
        if (e.target !== fileInput) numInput.focus();
    });
</script>

</body>
</html>
