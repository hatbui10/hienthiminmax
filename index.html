<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm khối số</title>
    <style>
        /* Reset căn bản để tránh tràn màn hình */
        * { box-sizing: border-box; }

        html, body {
            margin: 0; 
            padding: 0;
            width: 100%; 
            min-height: 100vh;
            display: flex; 
            justify-content: center; /* Căn giữa ngang */
            align-items: flex-start; /* Bắt đầu từ đỉnh trang */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0f13;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 500px;
            /* KHOẢNG CÁCH MÉP TRÊN 20PX TẠI ĐÂY */
            margin-top: 20px; 
            margin-bottom: 20px;
            display: flex;
            flex-direction: column; /* Xếp các phần tử theo hàng dọc */
            align-items: stretch; /* Giãn các phần tử con theo chiều rộng */
        }

        /* Vùng tải file */
        .file-upload {
            background: #1c1f26;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed #444;
            margin-bottom: 20px;
            text-align: center;
        }
        
        input[type="file"] { 
            font-size: 0.8rem; 
            color: #888; 
            width: 100%;
        }

        /* Ô nhập số */
        #numInput {
            width: 100%;
            height: 100px;
            font-size: 4.5rem;
            font-weight: bold;
            text-align: center;
            border: 3px solid #00d2ff;
            border-radius: 20px;
            background: #000;
            color: #00d2ff;
            outline: none;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.2);
            transition: transform 0.2s;
        }
        #numInput:focus { transform: scale(1.02); }

        /* Khu vực kết quả */
        #resultArea {
            background: #1c1f26;
            border-radius: 12px;
            padding: 5px 15px;
            display: none;
            border: 1px solid #333;
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .result-item {
            padding: 12px 0;
            border-bottom: 1px solid #2d323a;
            font-family: 'Consolas', monospace;
            font-size: 1.2rem;
            text-align: center;
        }
        .result-item:last-child { border-bottom: none; }

        .highlight { color: #ff4757; font-weight: bold; margin-right: 5px; }

        .status-bar { 
            background: #252a33;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #00ff88;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="file-upload">
        <div style="margin-bottom: 10px; font-size: 0.85rem; color: #aaa;">Tải tệp .txt để nạp dữ liệu:</div>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <input type="text" id="numInput" maxlength="2" placeholder="--" inputmode="numeric" autofocus autocomplete="off">
    
    <div id="resultArea"></div>

    <div class="status-bar" id="statusMsg">Đang kiểm tra bộ nhớ...</div>
</div>

<script>
    let allLines = [];
    const STORAGE_KEY = 'my_txt_data';

    const fileInput = document.getElementById('fileInput');
    const numInput = document.getElementById('numInput');
    const resultArea = document.getElementById('resultArea');
    const statusMsg = document.getElementById('statusMsg');

    // Tự động nạp dữ liệu cũ từ LocalStorage
    window.onload = function() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
            allLines = JSON.parse(savedData);
            statusMsg.innerText = `Sẵn sàng! Đã nạp ${allLines.length} dòng.`;
        } else {
            statusMsg.innerText = "Chưa có dữ liệu. Vui lòng tải tệp!";
            statusMsg.style.color = "#ff4757";
        }
        numInput.focus();
    };

    // Xử lý nạp File mới
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            allLines = content.split(/\r?\n/).filter(line => line.trim() !== "");
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allLines));
            
            statusMsg.innerText = `Đã cập nhật ${allLines.length} dòng mới.`;
            statusMsg.style.color = "#00ff88";
            numInput.focus();
        };
        reader.readAsText(file);
    });

    // Xử lý tìm kiếm khi nhập đủ 2 số
    numInput.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
        const searchVal = this.value;

        if (searchVal.length === 2) {
            if (allLines.length === 0) {
                statusMsg.innerText = "Lỗi: Không có dữ liệu!";
                this.value = "";
                return;
            }

            const matches = allLines.filter(line => line.trim().startsWith(searchVal));

            if (matches.length > 0) {
                resultArea.innerHTML = "";
                resultArea.style.display = "block";

                matches.forEach(line => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    const prefix = line.substring(0, 2);
                    const rest = line.substring(2);
                    div.innerHTML = `<span class="highlight">${prefix}</span>${rest}`;
                    resultArea.appendChild(div);
                });

                // Tự động Copy
                const copyText = searchVal + "x";
                navigator.clipboard.writeText(copyText).then(() => {
                    statusMsg.innerHTML = `Tìm thấy ${matches.length} dòng. <b>Đã Copy: ${copyText}</b>`;
                });

            } else {
                resultArea.style.display = "none";
                statusMsg.innerText = "Không tìm thấy khối: " + searchVal;
            }

            // Xóa ô nhập sau 800ms để nhập tiếp
            setTimeout(() => {
                this.value = "";
                this.focus();
            }, 800);
        }
    });

    // Luôn giữ focus vào ô nhập
    document.addEventListener('click', (e) => {
        if (e.target !== fileInput) numInput.focus();
    });
</script>

</body>
</html>
