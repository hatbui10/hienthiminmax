<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Luật số</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
margin-top:60px;
}

.box{
background:#1e293b;
padding:25px;
border-radius:12px;
width:360px;
}

input{
width:30%;
padding:12px;
font-size:22px;
text-align:center;
margin-bottom:10px;
border-radius:6px;
border:none;
}

#kq{
font-size:17px;
line-height:1.6;
white-space:pre-line;
margin-top:10px;
color:#22c55e;
}

</style>
</head>

<body>

<div class="box">

<input 
id="inputSo"
maxlength="1"
inputmode="numeric"
pattern="[0-9]*"
placeholder="Nhập số">

<input id="copySo" readonly placeholder="Số đã copy">

<div id="kq"></div>

</div>

<script>

let input=document.getElementById("inputSo");
let copy=document.getElementById("copySo");

window.onload=()=>{
input.focus();
}

input.addEventListener("input",function(){

let v=input.value;

if(!/^[0-9]$/.test(v)){
input.value="";
return;
}

copy.value=v;

navigator.clipboard.writeText(v);

hienLuat(Number(v));

setTimeout(()=>{
input.value="";
input.focus();
},50);

});

function hienLuat(n){

let text="";

if(n==0){
text=`
Sau 0 mà là >7 đánh lớn
Trước 0 mà <5 đánh lớn
Nếu có 2 cái <5 thì đánh nhỏ
Nếu gặp 000 thì đắnh nhỏ
Trước 0 có 2 cái >5 đánh lớn
Còn lại đánh nhỏ`;
}

else if(n==1){
text=`Gặp số 1 là đánh lớn. True`;
}

else if(n==2){
text=`Trước số 2 mà 
>5 đánh nhỏ , 
<5 đánh lớn 
Nhưng có 2 cái <5 thì đánh nhỏ`;
}

else if(n==3){
text=`Trước số 3 
  có 2 cái <5 đánh lớn;
  Gặp 33 đánh nhỏ
  Còn lại đánh nhỏ`
}

else if(n==4){
text=`Trước số 4 
có 2 cái <5 đánh lớn, 
còn lại đánh nhỏ. True`;
}

else if(n==5){
text=`Gặp số 5 đánh lớn. True`;
}

else if(n==6){
text=`
Trước 6 mà >5 đánh lớn True
Trước 6 có 2 cái <5 đánh lớn
Trước số 6 là 1 lớn 1 nhỏ thì đánh nhỏ`;
}

else if(n==7){
text=`3 số liên tiếp đều >7 thì đánh lớn
Trước sô 7 
có 2 cái <5  thì đánh nhỏ`;
}

else if(n==8){
text=`Trước 8 có 2 số giống nhau 
<5 đánh lớn
>5 đánh nhỏ
Trước 8 có 3 cái nhỏ thì đánh lớn
Trước 8 mà 1 lớn 1 nhỏ thì đánh nhỏ`;
}

else if(n==9){
text=`
Trước 9 có 2 cái <5 đánh lớn True
Trước 9 mà 1 lớn 1 nhỏ thì đánh lớn`;
}

document.getElementById("kq").innerText=text;

}

</script>

</body>
</html>
