<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao Diện Thu Gọn - Dark Gradient</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #14161a 0%, #243447 100%);
            background-attachment: fixed;
            color: #e0e0e0;
        }

        .card {
            background: rgba(255, 255, 255, 0.07);
            width: 98%;
            
            margin-top: 10px;
            padding: 5px; /* Giảm padding */
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        h2 { margin: 0 0 15px 0; color: #fff; font-size: 1.2rem; font-weight: 500; letter-spacing: 1px; }

        /* Ô nhập liệu: Đã thu nhỏ lại */
        #numInput {
            width: 50%;
            max-width: 160px;
            height: 75px; /* Giảm từ 100px */
            font-size: 3.2rem; /* Giảm cỡ chữ */
            font-weight: bold;
            text-align: center;
            border: 3px solid #00d2ff;
            border-radius: 12px;
            outline: none;
            display: block;
            margin: 0 auto 15px auto;
            background: rgba(0, 0, 0, 0.4);
            color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        /* Kết quả 4 dòng: Thu nhỏ khoảng cách */
        .result-container {
            text-align: left;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 10px;
            padding: 10px 15px;
            margin-bottom: 15px;
        }

        .result-line {
            display: flex;
            padding: 7px 0; /* Giảm đệm dòng */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1rem; /* Giảm cỡ chữ xuống 1rem */
        }
        .result-line:last-child { border-bottom: none; }

        .label { font-weight: bold; color: #90a4ae; width: 100px; flex-shrink: 0; }
        .value { color: #fff; }

        /* Khu vực Copy thu gọn */
        .copy-status { font-size: 0.9rem; color: #90a4ae; }
        #lastNum {
            font-size: 1.8rem; /* Thu nhỏ cỡ số copy */
            font-weight: bold;
            color: #1a1c20;
            background: linear-gradient(135deg, #a8ff78 0%, #78ffd6 100%);
            padding: 4px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>NHẬP SỐ</h2>
    
    <input type="text" id="numInput" 
           maxlength="2" 
           inputmode="numeric" 
           placeholder="--" 
           autofocus 
           autocomplete="off">
    
    <div class="result-container">
        <div class="result-line"><span class="label">Dòng 1:</span> <span class="value" id="line1">---</span></div>
        <div class="result-line"><span class="label">Dòng 2:</span> <span class="value" id="line2">---</span></div>
        <div class="result-line"><span class="label">Dòng 3:</span> <span class="value" id="line3">---</span></div>
        <div class="result-line"><span class="label">Dòng 4:</span> <span class="value" id="line4">---</span></div>
    </div>

    <div class="copy-box">
        <span class="copy-status">Đã copy:</span><br>
        <span id="lastNum">--x</span>
    </div>
</div>

<script>
    // Dữ liệu mẫu (Bạn tự thay d1-d4 theo ý mình)
    const DATA_MAP = {
        "00": { d1: "Lớn", d2: "Nhỏ", d3: "Bình thường", d4: "Ghi chú A" },
        "01": { d1: "Sản phẩm A", d2: "10k", d3: "Kho 1", d4: "Sẵn hàng" },
        "02": { d1: "Lớn", d2: "Nhỏ", d3: "Lớn", d4: "Lưu ý B" }
    };

    const inputEl = document.getElementById('numInput');
    const l1 = document.getElementById('line1');
    const l2 = document.getElementById('line2');
    const l3 = document.getElementById('line3');
    const l4 = document.getElementById('line4');
    const lastNum = document.getElementById('lastNum');

    inputEl.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');

        if (this.value.length === 2) {
            const val = this.value;
            const data = DATA_MAP[val];

            if (data) {
                l1.innerText = data.d1 || "---";
                l2.innerText = data.d2 || "---";
                l3.innerText = data.d3 || "---";
                l4.innerText = data.d4 || "---";
            } else {
                l1.innerText = "Không tìm thấy";
                l2.innerText = "---"; l3.innerText = "---"; l4.innerText = "---";
            }

            const stringToCopy = val + "x";
            lastNum.innerText = stringToCopy;

            // Xử lý Copy
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(stringToCopy);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = stringToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
            }

            // Xóa nhanh để nhập tiếp (150ms)
            setTimeout(() => {
                this.value = '';
                this.focus();
            }, 150);
        }
    });

    // Luôn giữ focus
    document.addEventListener('click', () => inputEl.focus());
</script>

</body>
</html>
